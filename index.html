<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>檔案上傳系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }

  /* 頂部導覽列 */
  .top-bar { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #eee; }
  .top-bar h1 { font-size: 16px; font-weight: 600; }
  .top-bar-right { display: flex; align-items: center; gap: 10px; }
  .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 99px; background: #f5f5f5; color: #888; }
  .status-badge.logged-in { background: #f0faf0; color: #3B6D11; }
  .status-badge.error { background: #fff0f0; color: #e24b4a; }

  /* 按鈕 */
  .btn-primary { padding: 8px 16px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: #2d72c0; }
  .btn-secondary { padding: 8px 16px; background: #f5f5f5; color: #333; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { background: #eee; }
  .btn-ghost { padding: 8px 16px; background: none; color: #888; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .btn-ghost:hover { color: #e24b4a; border-color: #e24b4a; }

  /* 彈窗 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: #888; margin-bottom: 16px; }
  .modal input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; margin-bottom: 10px; outline: none; transition: border-color 0.15s; }
  .modal input:focus { border-color: #378ADD; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; }
  .error-msg { color: #e24b4a; font-size: 12px; margin-bottom: 10px; min-height: 16px; }
  .success-msg { color: #3B6D11; font-size: 12px; margin-bottom: 10px; min-height: 16px; }

  /* 資料夾 */
  .section-title { font-size: 13px; color: #888; margin-bottom: 10px; }
  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  @media (max-width: 480px) { .folder-grid { grid-template-columns: repeat(2, 1fr); } }
  .folder-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .folder-card:hover { border-color: #378ADD; box-shadow: 0 2px 8px rgba(55,138,221,0.1); }
  .folder-card.active { border: 2px solid #378ADD; background: #f0f7ff; }
  .folder-card .icon { font-size: 22px; margin-bottom: 6px; }
  .folder-card .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .add-folder-card { background: #fafafa; border: 1px dashed #ccc; border-radius: 12px; padding: 12px 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: border-color 0.15s; }
  .add-folder-card:hover { border-color: #378ADD; }
  .add-folder-card .plus { font-size: 22px; color: #aaa; }
  .add-folder-card .label { font-size: 13px; color: #888; }

  /* 檔案列表 */
  .file-section { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; margin-bottom: 16px; }
  .file-section-header { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
  .file-section-header span { font-size: 13px; color: #888; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #e8f0fe; color: #185FA5; font-weight: 500; }
  .file-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f5f5f5; }
  .file-row:last-child { border-bottom: none; }
  .file-type-icon { font-size: 18px; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .file-date { font-size: 11px; color: #aaa; flex-shrink: 0; }
  .empty-files { padding: 24px; text-align: center; color: #aaa; font-size: 13px; }

  /* 上傳區 */
  .upload-section { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 20px; }
  .upload-zone { border: 2px dashed #ddd; border-radius: 12px; padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #378ADD; background: #f0f7ff; }
  .upload-zone .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-zone .upload-text { font-size: 14px; color: #444; margin-bottom: 4px; }
  .upload-zone .upload-hint { font-size: 12px; color: #aaa; }
  .upload-btn-label { display: inline-block; margin-top: 12px; padding: 8px 20px; background: #378ADD; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .login-hint { text-align: center; padding: 20px; background: #fffbe6; border-radius: 10px; border: 1px solid #ffe58f; }
  .login-hint p { font-size: 13px; color: #876800; margin-bottom: 12px; }

  /* 進度條 */
  .upload-list { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .upload-item { background: #f9f9f9; border-radius: 10px; padding: 10px 14px; }
  .upload-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .upload-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
  .upload-item-status { font-size: 11px; color: #888; flex-shrink: 0; }
  .upload-item-status.done { color: #3B6D11; }
  .upload-item-status.error { color: #e24b4a; }
  .progress-bar { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #378ADD; border-radius: 2px; transition: width 0.3s; }
  .progress-fill.done { background: #639922; }
</style>
</head>
<body>

<!-- 登入彈窗 -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h3>🔐 登入</h3>
    <p>輸入密碼後可上傳檔案及新增資料夾</p>
    <input type="password" id="login-password" placeholder="輸入密碼" />
    <div class="error-msg" id="login-error"></div>
    <div class="success-msg" id="login-success"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeLoginModal()">取消</button>
      <button class="btn-primary" id="login-confirm-btn" onclick="confirmLogin()">登入</button>
    </div>
  </div>
</div>

<!-- 新增資料夾彈窗 -->
<div class="modal-overlay" id="folder-modal">
  <div class="modal">
    <h3>新增資料夾</h3>
    <p>在目前位置建立新資料夾</p>
    <input type="text" id="folder-name-input" placeholder="資料夾名稱" />
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeFolderModal()">取消</button>
      <button class="btn-primary" onclick="confirmCreateFolder()">建立</button>
    </div>
  </div>
</div>

<!-- 主畫面（直接顯示，不需登入） -->
<div class="container">
  <div class="top-bar">
    <h1>📁 檔案上傳系統</h1>
    <div class="top-bar-right">
      <span class="status-badge" id="status-badge">訪客模式</span>
      <button id="auth-btn" class="btn-primary" onclick="handleAuthBtn()">登入</button>
    </div>
  </div>

  <div class="section-title">選擇資料夾</div>
  <div class="folder-grid" id="folder-grid">
    <div class="folder-card" style="opacity:0.5;pointer-events:none">
      <div class="icon">📁</div>
      <div class="name">載入中...</div>
    </div>
  </div>

  <div class="file-section">
    <div class="file-section-header">
      <span>檔案列表</span>
      <span class="badge" id="current-folder-badge">請先選擇資料夾</span>
    </div>
    <div id="file-list">
      <div class="empty-files">請先選擇資料夾</div>
    </div>
  </div>

  <div class="upload-section">
    <div id="upload-area">
      <div class="empty-files">請先選擇資料夾</div>
    </div>
    <div class="upload-list" id="upload-list"></div>
  </div>
</div>

<script>
  const WORKER_URL = 'https://liminguploader.c3012312.workers.dev';

  let password = '';
  let isLoggedIn = false;
  let currentFolderId = null;
  let currentFolderName = '';

  // 頁面載入：直接顯示資料夾，不需要密碼
  window.onload = () => loadFolders();

  // ── 登入 / 登出 ──────────────────────────

  function handleAuthBtn() {
    if (isLoggedIn) {
      logout();
    } else {
      openLoginModal();
    }
  }

  function openLoginModal() {
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
    document.getElementById('login-success').textContent = '';
    document.getElementById('login-confirm-btn').disabled = false;
    document.getElementById('login-confirm-btn').textContent = '登入';
    document.getElementById('login-modal').classList.add('show');
    setTimeout(() => document.getElementById('login-password').focus(), 100);
  }

  function closeLoginModal() {
    document.getElementById('login-modal').classList.remove('show');
  }

  async function confirmLogin() {
    const input = document.getElementById('login-password').value.trim();
    if (!input) return;

    // 顯示驗證中狀態
    const btn = document.getElementById('login-confirm-btn');
    btn.disabled = true;
    btn.textContent = '驗證中...';
    document.getElementById('login-error').textContent = '';

    try {
      // 呼叫專門的驗證端點
      const res = await fetch(`${WORKER_URL}/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: input })
      });
      const data = await res.json();

      if (data.ok) {
        // 登入成功
        password = input;
        isLoggedIn = true;
        document.getElementById('login-success').textContent = '✓ 登入成功！';
        document.getElementById('status-badge').textContent = '已登入';
        document.getElementById('status-badge').className = 'status-badge logged-in';
        document.getElementById('auth-btn').textContent = '登出';
        document.getElementById('auth-btn').className = 'btn-ghost';
        // 短暫顯示成功訊息後關閉
        setTimeout(() => {
          closeLoginModal();
          loadFolders(); // 重新載入，顯示新增資料夾按鈕
          if (currentFolderId) showUploadZone();
        }, 800);
      } else {
        // 登入失敗
        document.getElementById('login-error').textContent = '✗ 密碼錯誤，請再試一次';
        document.getElementById('status-badge').textContent = '密碼錯誤';
        document.getElementById('status-badge').className = 'status-badge error';
        btn.disabled = false;
        btn.textContent = '登入';
      }
    } catch (err) {
      document.getElementById('login-error').textContent = '網路錯誤，請稍後再試';
      btn.disabled = false;
      btn.textContent = '登入';
    }
  }

  function logout() {
    password = '';
    isLoggedIn = false;
    document.getElementById('status-badge').textContent = '訪客模式';
    document.getElementById('status-badge').className = 'status-badge';
    document.getElementById('auth-btn').textContent = '登入';
    document.getElementById('auth-btn').className = 'btn-primary';
    loadFolders();
    // 隱藏上傳區
    if (currentFolderId) {
      showLoginHint();
    } else {
      document.getElementById('upload-area').innerHTML =
        '<div class="empty-files">請先選擇資料夾</div>';
    }
  }

  // ── 資料夾 ────────────────────────────────

  async function loadFolders() {
    const res = await fetch(`${WORKER_URL}/folders`);
    const data = await res.json();
    const grid = document.getElementById('folder-grid');
    grid.innerHTML = '';

    (data.files || []).forEach(folder => {
      const card = document.createElement('div');
      card.className = 'folder-card' + (folder.id === currentFolderId ? ' active' : '');
      card.innerHTML = `<div class="icon">📁</div><div class="name">${folder.name}</div>`;
      card.onclick = () => selectFolder(folder.id, folder.name, card);
      grid.appendChild(card);
    });

    // 登入後才顯示新增資料夾按鈕
    if (isLoggedIn) {
      const addCard = document.createElement('div');
      addCard.className = 'add-folder-card';
      addCard.innerHTML = `<div class="plus">＋</div><div class="label">新增資料夾</div>`;
      addCard.onclick = openFolderModal;
      grid.appendChild(addCard);
    }
  }

  function selectFolder(id, name, cardEl) {
    currentFolderId = id;
    currentFolderName = name;
    document.getElementById('current-folder-badge').textContent = name;
    document.querySelectorAll('.folder-card').forEach(c => c.classList.remove('active'));
    cardEl.classList.add('active');
    loadFiles(id);
    if (isLoggedIn) {
      showUploadZone();
    } else {
      showLoginHint();
    }
  }

  function showLoginHint() {
    document.getElementById('upload-area').innerHTML = `
      <div class="login-hint">
        <p>登入後才能上傳檔案或新增資料夾</p>
        <button class="btn-primary" onclick="openLoginModal()">立即登入</button>
      </div>
    `;
  }

  function openFolderModal() {
    document.getElementById('folder-name-input').value = '';
    document.getElementById('folder-modal').classList.add('show');
    setTimeout(() => document.getElementById('folder-name-input').focus(), 100);
  }

  function closeFolderModal() {
    document.getElementById('folder-modal').classList.remove('show');
  }

  async function confirmCreateFolder() {
    const name = document.getElementById('folder-name-input').value.trim();
    if (!name) return;
    await fetch(`${WORKER_URL}/folders`, {
      method: 'POST',
      headers: { 'X-Password': password, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    closeFolderModal();
    loadFolders();
  }

  // ── 檔案列表（公開）─────────────────────

  async function loadFiles(folderId) {
    document.getElementById('file-list').innerHTML =
      '<div class="empty-files">載入中...</div>';
    const res = await fetch(`${WORKER_URL}/files?folderId=${folderId}`);
    const data = await res.json();
    const list = document.getElementById('file-list');
    if (!data.files || data.files.length === 0) {
      list.innerHTML = '<div class="empty-files">這個資料夾還沒有檔案</div>';
      return;
    }
    list.innerHTML = data.files.map(f => `
      <div class="file-row">
        <div class="file-type-icon">${getFileIcon(f.mimeType)}</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${formatSize(f.size)}</div>
        </div>
        <div class="file-date">${formatDate(f.createdTime)}</div>
      </div>
    `).join('');
  }

  // ── 上傳功能（需要登入）─────────────────

  function showUploadZone() {
    const area = document.getElementById('upload-area');
    area.innerHTML = `
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">⬆️</div>
        <div class="upload-text">拖曳檔案到這裡</div>
        <div class="upload-hint">支援所有格式，無大小限制</div>
        <label class="upload-btn-label">選擇檔案
          <input type="file" style="display:none" multiple onchange="handleFiles(this.files)">
        </label>
      </div>
    `;
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
  }

  async function handleFiles(files) {
    for (const file of files) await uploadFile(file);
    loadFiles(currentFolderId);
  }

async function uploadFile(file) {
  const itemId = 'upload-' + Date.now() + Math.random();
  const list = document.getElementById('upload-list');
  const item = document.createElement('div');
  item.className = 'upload-item';
  item.id = itemId;
  item.innerHTML = `
    <div class="upload-item-header">
      <div class="upload-item-name">${file.name}</div>
      <div class="upload-item-status" id="${itemId}-status">上傳中...</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="${itemId}-bar" style="width:5%"></div>
    </div>
  `;
  list.prepend(item);

  try {
    const res = await fetch(`${WORKER_URL}/upload`, {
      method: 'POST',
      headers: {
        'X-Password': password,
        'Content-Type': file.type || 'application/octet-stream',
        'X-File-Meta': encodeURIComponent(JSON.stringify({
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          folderId: currentFolderId
        }))
      },
      body: file,
    });

    if (res.ok) {
      document.getElementById(`${itemId}-bar`).style.width = '100%';
      document.getElementById(`${itemId}-bar`).className = 'progress-fill done';
      document.getElementById(`${itemId}-status`).textContent = '完成 ✓';
      document.getElementById(`${itemId}-status`).className = 'upload-item-status done';
    } else {
      throw new Error('上傳失敗');
    }
  } catch (err) {
    document.getElementById(`${itemId}-status`).textContent = '上傳失敗';
    document.getElementById(`${itemId}-status`).className = 'upload-item-status error';
  }
}

  function uploadWithProgress(file, uploadUrl, itemId) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', uploadUrl);
      xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          document.getElementById(`${itemId}-bar`).style.width = pct + '%';
          document.getElementById(`${itemId}-status`).textContent = pct + '%';
        }
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          document.getElementById(`${itemId}-bar`).style.width = '100%';
          document.getElementById(`${itemId}-bar`).className = 'progress-fill done';
          document.getElementById(`${itemId}-status`).textContent = '完成 ✓';
          document.getElementById(`${itemId}-status`).className = 'upload-item-status done';
          resolve();
        } else { reject(new Error('上傳失敗')); }
      };
      xhr.onerror = () => reject(new Error('網路錯誤'));
      xhr.send(file);
    });
  }

  // ── 鍵盤快捷鍵 ───────────────────────────

  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmLogin();
    if (e.key === 'Escape') closeLoginModal();
  });
  document.getElementById('folder-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmCreateFolder();
    if (e.key === 'Escape') closeFolderModal();
  });

  // ── 工具函式 ─────────────────────────────

  function getFileIcon(mime) {
    if (!mime) return '📄';
    if (mime.startsWith('image/')) return '🖼️';
    if (mime.startsWith('video/')) return '🎬';
    if (mime.startsWith('audio/')) return '🎵';
    if (mime.includes('pdf')) return '📕';
    if (mime.includes('zip') || mime.includes('rar')) return '🗜️';
    if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
    if (mime.includes('presentation') || mime.includes('powerpoint')) return '📊';
    if (mime.includes('document') || mime.includes('word')) return '📝';
    return '📄';
  }

  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
</script>
</body>
</html>
